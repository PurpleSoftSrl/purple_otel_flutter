name: purple_otel_flutter
description: OpenTelemetry auto-instrumentation for Flutter — navigation tracking, lifecycle monitoring, and error capture.
version: 0.1.2
repository: https://github.com/purplesoftsrl/purple_otel_flutter
homepage: https://github.com/purplesoftsrl/purple_otel_flutter
topics: [opentelemetry, flutter, tracing, observability]
license: AGPL-3.0

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  purple_otel_api: ^0.1.0
  purple_otel_sdk: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
